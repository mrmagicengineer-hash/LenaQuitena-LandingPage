services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/prisma/menu.db
    volumes:
      - backend-db:/app/prisma
    restart: unless-stopped

volumes:
  backend-db:
